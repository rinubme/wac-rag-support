<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAC AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container py-4">
        <h2 class="mb-4 text-center">🤖 WAC AI Customer Support</h2>
        <p class="text-center text-muted mb-4">Ask questions about Washington Administrative Code (WAC)</p>
        
        <div id="chat" class="chat-container p-3 mb-3"></div>
        
        <div class="input-group">
            <input type="text" id="question" class="form-control" 
                   placeholder="E.g., What are the licensing requirements under WAC 296?">
            <button onclick="sendMessage()" class="btn btn-primary" id="sendBtn">Send</button>
        </div>
        
        <div class="mt-3 text-center">
            <small class="text-muted">Place official WAC PDF files in the <strong>wac_data</strong> folder</small>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, type, sources = []) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            let html = `<strong>${type === 'user' ? 'You' : 'WAC Assistant'}:</strong><br>${text}`;
            
            if (sources.length > 0 && type === 'bot') {
                html += `<br><small class="text-muted">Sources: ${sources.join(', ')}</small>`;
            }
            
            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showThinking() {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking';
            thinkingDiv.className = 'message bot';
            thinkingDiv.innerHTML = `<strong>WAC Assistant:</strong><br><span class="thinking">Thinking<span class="dots">...</span></span>`;
            chat.appendChild(thinkingDiv);
            chat.scrollTop = chat.scrollHeight;
            return thinkingDiv;
        }

        function removeThinking() {
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();
        }

        async function sendMessage() {
            const questionText = input.value.trim();
            if (!questionText) return;

            // Add user message
            addMessage(questionText, 'user');
            input.value = '';
            
            // Disable input while processing
            input.disabled = true;
            sendBtn.disabled = true;

            // Show thinking indicator
            const thinkingDiv = showThinking();

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: questionText })
                });

                const data = await res.json();
                removeThinking();

                if (data.error) {
                    addMessage(data.error, 'bot');
                } else {
                    addMessage(data.answer, 'bot', data.sources || []);
                }
            } catch (err) {
                removeThinking();
                addMessage("Sorry, I couldn't connect to the server. Make sure the backend is running.", 'bot');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Send message on Enter key
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Optional: Welcome message
        window.onload = function() {
            addMessage("Hello! I'm your WAC AI assistant. How can I help you with Washington Administrative Code today?", 'bot');
        };
    </script>
</body>
</html>
